<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Siraj Patnam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #20b8cd;
      --accent-light: #5ce0f0;
      --accent-dim: rgba(32,184,205,0.15);
      --bg: #0a0a0f;
      --bg2: #0e0e16;
      --bg-glass: rgba(20,20,32,0.55);
      --text: #e8e8ed;
      --text2: #8b8b9e;
      --text3: #5a5a72;
      --border: rgba(255,255,255,0.06);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --purple: #a78bfa;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: var(--bg); }

    /* Login */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-box {
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px;
      backdrop-filter: blur(16px); box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-logo {
      font-family: var(--mono); font-size: 1.8rem; font-weight: 800;
      text-align: center; margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      text-align: center; color: var(--text2); font-size: 0.85rem;
      margin-bottom: 32px; font-family: var(--mono); letter-spacing: 1px;
      text-transform: uppercase;
    }
    .login-input {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 0.9rem;
      outline: none; transition: border-color 0.2s; margin-bottom: 16px;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-input::placeholder { color: var(--text3); }
    .login-btn {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), #1a8a9a);
      color: white; font-weight: 600; font-size: 0.95rem; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(32,184,205,0.3); }
    .login-error {
      color: var(--red); font-size: 0.8rem; text-align: center;
      margin-top: 12px; display: none;
    }

    /* Dashboard layout */
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .login-screen.hidden { display: none; }

    .dash-header {
      padding: 20px 32px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg2);
    }
    .dash-logo { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; }
    .dash-logo span { color: var(--accent); }
    .dash-title {
      font-family: var(--mono); font-size: 0.72rem; color: var(--accent);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .dash-actions { display: flex; gap: 10px; }
    .dash-refresh, .dash-logout {
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-size: 0.78rem;
      font-family: var(--mono); cursor: pointer; transition: all 0.2s;
    }
    .dash-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .dash-logout:hover { border-color: var(--red); color: var(--red); }

    .dash-body { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px; backdrop-filter: blur(12px);
    }
    .stat-card-label {
      font-size: 0.72rem; color: var(--text3); font-family: var(--mono);
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
    }
    .stat-card-value { font-size: 2rem; font-weight: 800; color: var(--accent); }
    .stat-card:nth-child(2) .stat-card-value { color: var(--green); }
    .stat-card:nth-child(3) .stat-card-value { color: var(--purple); }
    .stat-card:nth-child(4) .stat-card-value { color: var(--yellow); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 10px 20px; border: none; background: transparent;
      color: var(--text3); font-family: var(--mono); font-size: 0.8rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s;
      border-bottom: 2px solid transparent; letter-spacing: 0.5px;
    }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Tables */
    .table-wrap {
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; backdrop-filter: blur(12px);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 14px 18px;
      font-family: var(--mono); font-size: 0.7rem; font-weight: 600;
      color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
      border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2);
    }
    td {
      padding: 14px 18px; font-size: 0.85rem; color: var(--text2);
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(32,184,205,0.03); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.7rem; font-weight: 600; font-family: var(--mono);
      letter-spacing: 0.5px;
    }
    .badge-confirmed { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge-cancelled { background: rgba(239,68,68,0.12); color: var(--red); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text3);
      font-family: var(--mono); font-size: 0.85rem;
    }
    .empty-state-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }

    /* Conversations */
    .convo-list { display: flex; flex-direction: column; gap: 12px; }
    .convo-card {
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px; backdrop-filter: blur(12px);
      cursor: pointer; transition: border-color 0.2s;
    }
    .convo-card:hover { border-color: rgba(32,184,205,0.3); }
    .convo-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .convo-id { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); }
    .convo-date { font-size: 0.72rem; color: var(--text3); }
    .convo-preview { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }
    .convo-messages {
      display: none; margin-top: 14px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .convo-card.expanded .convo-messages { display: block; }
    .convo-msg { padding: 8px 0; font-size: 0.82rem; line-height: 1.5; }
    .convo-msg-role {
      font-family: var(--mono); font-size: 0.68rem; font-weight: 600;
      margin-bottom: 2px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .convo-msg-role.user { color: var(--purple); }
    .convo-msg-role.assistant { color: var(--accent); }
    .convo-msg-text { color: var(--text2); }

    .timestamp { font-family: var(--mono); font-size: 0.72rem; color: var(--text3); }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .dash-header { padding: 16px 20px; flex-wrap: wrap; gap: 10px; }
      .dash-body { padding: 20px 16px; }
      th, td { padding: 10px 12px; font-size: 0.78rem; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 600px; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .login-box { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="login-logo">&lt;<span>SP</span>/&gt;</div>
      <div class="login-sub">Mission Control</div>
      <form id="login-form">
        <input type="password" class="login-input" id="pw-input" placeholder="Enter dashboard password" autocomplete="off">
        <button type="submit" class="login-btn">Access Dashboard</button>
      </form>
      <p class="login-error" id="login-error">Invalid password. Try again.</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <header class="dash-header">
      <div>
        <div class="dash-logo">&lt;<span>SP</span>/&gt;</div>
        <div class="dash-title">Mission Control</div>
      </div>
      <div class="dash-actions">
        <button class="dash-refresh" id="refresh-btn">Refresh</button>
        <button class="dash-logout" id="logout-btn">Logout</button>
      </div>
    </header>

    <div class="dash-body">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Total Leads</div>
          <div class="stat-card-value" id="stat-leads">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Meetings</div>
          <div class="stat-card-value" id="stat-meetings">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Conversations</div>
          <div class="stat-card-value" id="stat-convos">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Upcoming</div>
          <div class="stat-card-value" id="stat-upcoming">-</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="leads">Leads</button>
        <button class="tab-btn" data-tab="meetings">Meetings</button>
        <button class="tab-btn" data-tab="conversations">Conversations</button>
      </div>

      <div class="tab-panel active" id="panel-leads">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Role</th><th>Date</th></tr></thead>
            <tbody id="leads-body"></tbody>
          </table>
        </div>
      </div>

      <div class="tab-panel" id="panel-meetings">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Time</th><th>Recruiter</th><th>Email</th><th>Topic</th><th>Status</th></tr></thead>
            <tbody id="meetings-body"></tbody>
          </table>
        </div>
      </div>

      <div class="tab-panel" id="panel-conversations">
        <div class="convo-list" id="convo-list"></div>
      </div>
    </div>
  </div>

<script>
(function() {
  let password = '';
  const loginScreen = document.getElementById('login-screen');
  const dashboard = document.getElementById('dashboard');
  const loginForm = document.getElementById('login-form');
  const pwInput = document.getElementById('pw-input');
  const loginError = document.getElementById('login-error');

  loginForm.addEventListener('submit', async e => {
    e.preventDefault();
    password = pwInput.value;
    loginError.style.display = 'none';
    try {
      const res = await fetch('/api/dashboard/stats?pw=' + encodeURIComponent(password));
      if (!res.ok) throw new Error();
      loginScreen.classList.add('hidden');
      dashboard.classList.add('active');
      loadAll();
    } catch {
      loginError.style.display = 'block';
      pwInput.value = '';
      pwInput.focus();
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    password = '';
    dashboard.classList.remove('active');
    loginScreen.classList.remove('hidden');
    pwInput.value = '';
  });

  document.getElementById('refresh-btn').addEventListener('click', loadAll);

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  async function apiFetch(endpoint) {
    const res = await fetch('/api/dashboard/' + endpoint + '?pw=' + encodeURIComponent(password));
    if (!res.ok) throw new Error();
    return res.json();
  }

  function fmtDate(iso) {
    if (!iso) return '-';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadAll() {
    try {
      const [stats, leads, meetings, convos] = await Promise.all([
        apiFetch('stats'), apiFetch('leads'), apiFetch('meetings'), apiFetch('conversations'),
      ]);

      document.getElementById('stat-leads').textContent = stats.totalLeads;
      document.getElementById('stat-meetings').textContent = stats.totalMeetings;
      document.getElementById('stat-convos').textContent = stats.totalConversations;
      document.getElementById('stat-upcoming').textContent = stats.upcomingMeetings;

      // Leads
      const lb = document.getElementById('leads-body');
      if (!leads.length) {
        lb.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">~</div>No leads yet. They appear when visitors chat with your AI.</div></td></tr>';
      } else {
        lb.innerHTML = leads.sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).map(l => '<tr>'
          + '<td><strong style="color:var(--text)">' + esc(l.name) + '</strong></td>'
          + '<td>' + esc(l.email||'-') + '</td>'
          + '<td>' + esc(l.company||'-') + '</td>'
          + '<td>' + esc(l.role||'-') + '</td>'
          + '<td class="timestamp">' + fmtDate(l.createdAt) + '</td>'
          + '</tr>').join('');
      }

      // Meetings
      const mb = document.getElementById('meetings-body');
      if (!meetings.length) {
        mb.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">~</div>No meetings scheduled yet.</div></td></tr>';
      } else {
        mb.innerHTML = meetings.sort((a,b) => new Date(b.date)-new Date(a.date)).map(m => '<tr>'
          + '<td class="timestamp">' + esc(m.date) + '</td>'
          + '<td class="timestamp">' + esc(m.time) + '</td>'
          + '<td><strong style="color:var(--text)">' + esc(m.recruiterName) + '</strong></td>'
          + '<td>' + esc(m.recruiterEmail||'-') + '</td>'
          + '<td>' + esc(m.topic||'-') + '</td>'
          + '<td><span class="badge badge-' + m.status + '">' + m.status + '</span></td>'
          + '</tr>').join('');
      }

      // Conversations
      const cl = document.getElementById('convo-list');
      if (!convos.length) {
        cl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">~</div>No conversations yet.</div>';
      } else {
        cl.innerHTML = convos.sort((a,b) => new Date(b.updatedAt)-new Date(a.updatedAt)).map(c => {
          const msgs = c.messages || [];
          const first = msgs.find(m => m.role === 'user');
          const preview = first ? first.content.slice(0,120) + (first.content.length > 120 ? '...' : '') : 'No messages';
          const msgHTML = msgs.map(m =>
            '<div class="convo-msg">'
            + '<div class="convo-msg-role ' + m.role + '">' + m.role + '</div>'
            + '<div class="convo-msg-text">' + esc(m.content) + '</div>'
            + '</div>'
          ).join('');
          return '<div class="convo-card" onclick="this.classList.toggle(\'expanded\')">'
            + '<div class="convo-header">'
            + '<span class="convo-id">' + esc((c.sessionId||'').slice(0,20)) + '...</span>'
            + '<span class="convo-date">' + fmtDate(c.updatedAt) + '</span>'
            + '</div>'
            + '<div class="convo-preview">' + esc(preview) + '</div>'
            + '<div class="convo-messages">' + msgHTML + '</div>'
            + '</div>';
        }).join('');
      }
    } catch (err) { console.error('Load error:', err); }
  }
})();
</script>
</body>
</html>
